name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-35 build-tools;35.0.0 platforms;android-34 build-tools;34.0.0'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Download and strip code-server (ARM64)
        run: |
          mkdir -p app/src/main/assets/code-server
          curl -L --retry 3 --retry-delay 10 \
            "https://github.com/coder/code-server/releases/download/v4.106.2/code-server-4.106.2-linux-arm64.tar.gz" \
            -o /tmp/code-server.tar.gz
          tar -xzf /tmp/code-server.tar.gz -C app/src/main/assets/code-server --strip-components=1
          rm /tmp/code-server.tar.gz
          rm -rf app/src/main/assets/code-server/node_modules
          rm -rf app/src/main/assets/code-server/lib/node
          rm -rf app/src/main/assets/code-server/lib/vscode/extensions/ms-python.python-*
          rm -rf app/src/main/assets/code-server/lib/vscode/extensions/ms-vscode.cpptools-*
          rm -rf app/src/main/assets/code-server/lib/vscode/extensions/ms-dotnettools.csharp-*
          rm -rf app/src/main/assets/code-server/lib/vscode/extensions/golang.go-*
          rm -rf app/src/main/assets/code-server/lib/vscode/extensions/rust-lang.rust-analyzer-*
          find app/src/main/assets/code-server -name "*.map" -delete
          find app/src/main/assets/code-server -name "*.ts" -delete

      - name: Copy Android SDK assets
        run: |
          mkdir -p app/src/main/assets/android-sdk/build-tools/34.0.0
          cp -r $ANDROID_HOME/build-tools/34.0.0/* app/src/main/assets/android-sdk/build-tools/34.0.0/
          mkdir -p app/src/main/assets/android-sdk/platforms/android-34
          cp -r $ANDROID_HOME/platforms/android-34/* app/src/main/assets/android-sdk/platforms/android-34/
          find app/src/main/assets/android-sdk/platforms/android-34/data/res -name "*.png" ! -path "*/drawable*" ! -path "*/mipmap*" -delete 2>/dev/null || true
          rm -rf app/src/main/assets/android-sdk/platforms/android-34/data/fonts 2>/dev/null || true
          rm -rf app/src/main/assets/android-sdk/platforms/android-34/templates 2>/dev/null || true
          rm -rf app/src/main/assets/android-sdk/platforms/android-34/skins 2>/dev/null || true

      - name: Replace build-tools with ARM64 versions
        run: |
          curl -L --retry 5 --retry-delay 15 \
            "https://github.com/lzhiyong/android-sdk-tools/releases/download/34.0.3/android-sdk-tools-static-aarch64.zip" \
            -o /tmp/arm64-tools.zip
          unzip -qo /tmp/arm64-tools.zip -d /tmp/arm64-tools
          cp -rf /tmp/arm64-tools/build-tools/* app/src/main/assets/android-sdk/build-tools/34.0.0/
          chmod -R +x app/src/main/assets/android-sdk/build-tools/34.0.0/
          rm -rf /tmp/arm64-tools.zip /tmp/arm64-tools

      - name: Download and aggressively strip OpenJDK 17 (ARM64)
        run: |
          mkdir -p app/src/main/assets/openjdk
          curl -L --retry 5 --retry-delay 30 \
            "https://mirrors.tuna.tsinghua.edu.cn/termux/apt/termux-main/pool/main/o/openjdk-17/openjdk-17_17.0.19_aarch64.deb" \
            -o /tmp/jdk.deb
          dpkg-deb -x /tmp/jdk.deb /tmp/jdk-extracted
          JDK_ROOT=$(dirname $(dirname $(find /tmp/jdk-extracted -name java ! -type d | head -1)))
          cp -r "$JDK_ROOT"/* app/src/main/assets/openjdk/
          rm -rf /tmp/jdk.deb /tmp/jdk-extracted
          rm -rf app/src/main/assets/openjdk/jmods
          rm -rf app/src/main/assets/openjdk/demo
          rm -rf app/src/main/assets/openjdk/sample
          rm -rf app/src/main/assets/openjdk/man
          rm -rf app/src/main/assets/openjdk/include
          rm -f app/src/main/assets/openjdk/lib/src.zip
          rm -rf app/src/main/assets/openjdk/jmc
          rm -rf app/src/main/assets/openjdk/legal
          for tool in jshell jlink jdeps jstat jmap jstack jcmd jpackage javadoc jarsigner jdeprscan jfr jhsdb jps jconsole jwebserver keytool rmiregistry serialver; do
            rm -f app/src/main/assets/openjdk/bin/$tool
          done

      - name: Generate Gradle config (Maven mirrors + wrapper fix)
        run: |
          mkdir -p app/src/main/assets/gradle-config
          cat > app/src/main/assets/gradle-config/init.gradle << 'INIT'
          allprojects {
              buildscript {
                  repositories {
                      maven { url 'https://maven.aliyun.com/repository/public' }
                      maven { url 'https://maven.aliyun.com/repository/google' }
                      maven { url 'https://maven.aliyun.com/repository/gradle-plugin' }
                  }
              }
              repositories {
                  maven { url 'https://maven.aliyun.com/repository/public' }
                  maven { url 'https://maven.aliyun.com/repository/google' }
                  maven { url 'https://maven.aliyun.com/repository/gradle-plugin' }
              }
          }
          INIT
          cat > app/src/main/assets/gradle-config/setup-gradle-mirror.sh << 'SETUP'
          #!/system/bin/sh
          GRADLE_USER_HOME="${GRADLE_USER_HOME:-$HOME/.gradle}"
          mkdir -p "$GRADLE_USER_HOME"
          SRC_INIT="$(dirname "$0")/init.gradle"
          if [ -f "$SRC_INIT" ]; then
            cp "$SRC_INIT" "$GRADLE_USER_HOME/init.gradle"
            echo "Gradle Maven mirrors configured (Aliyun)"
          fi
          for wrapper_props in $(find /data -name "gradle-wrapper.properties" 2>/dev/null); do
            if grep -q "services.gradle.org" "$wrapper_props" 2>/dev/null; then
              sed -i 's|https\\\{0,1\}://services\.gradle\.org/distributions|https\\://mirrors.tuna.tsinghua.edu.cn/gradle/gradle-distributions|g' "$wrapper_props"
              echo "Fixed Gradle wrapper: $wrapper_props"
            fi
          done
          echo "Done. All downloads now use Chinese mirrors."
          SETUP
          chmod +x app/src/main/assets/gradle-config/setup-gradle-mirror.sh

      - name: Show asset sizes
        run: |
          echo "=== Asset sizes ==="
          du -sh app/src/main/assets/code-server
          du -sh app/src/main/assets/openjdk
          du -sh app/src/main/assets/android-sdk/build-tools
          du -sh app/src/main/assets/android-sdk/platforms
          du -sh app/src/main/assets/gradle-config
          echo "=== Total assets ==="
          du -sh app/src/main/assets/

      - name: Build debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: mobile-as-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
