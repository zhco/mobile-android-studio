name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK (minimal)
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 build-tools;34.0.0'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Download and strip code-server (ARM64)
        run: |
          mkdir -p app/src/main/assets/code-server
          curl -L --retry 3 --retry-delay 10 \
            "https://github.com/coder/code-server/releases/download/v4.106.2/code-server-4.106.2-linux-arm64.tar.gz" \
            -o /tmp/code-server.tar.gz
          tar -xzf /tmp/code-server.tar.gz -C app/src/main/assets/code-server --strip-components=1
          rm /tmp/code-server.tar.gz
          rm -rf app/src/main/assets/code-server/node_modules
          # lib/node is the actual Node.js binary - do NOT delete
          for ext in ms-python.python ms-vscode.cpptools ms-dotnettools.csharp golang.go rust-lang.rust-analyzer ms-azuretools.vscode-docker ms-vscode.powershell redhat.java ms-vscode.vscode-typescript-next; do
            rm -rf app/src/main/assets/code-server/lib/vscode/extensions/${ext}-* 2>/dev/null || true
          done
          find app/src/main/assets/code-server -name "*.map" -delete
          find app/src/main/assets/code-server -name "*.ts" -delete

      - name: Copy platform android.jar only
        run: |
          mkdir -p app/src/main/assets/android-sdk/platforms/android-34
          cp $ANDROID_HOME/platforms/android-34/android.jar app/src/main/assets/android-sdk/platforms/android-34/

      - name: Download ARM64 build-tools only
        run: |
          mkdir -p app/src/main/assets/android-sdk/build-tools/34.0.0
          curl -L --retry 5 --retry-delay 15 \
            "https://github.com/lzhiyong/android-sdk-tools/releases/download/34.0.3/android-sdk-tools-static-aarch64.zip" \
            -o /tmp/arm64-tools.zip
          unzip -qo /tmp/arm64-tools.zip -d /tmp/arm64-tools
          cp -rf /tmp/arm64-tools/build-tools/* app/src/main/assets/android-sdk/build-tools/34.0.0/
          chmod -R +x app/src/main/assets/android-sdk/build-tools/34.0.0/
          rm -rf /tmp/arm64-tools.zip /tmp/arm64-tools
          rm -f app/src/main/assets/android-sdk/build-tools/34.0.0/lib64/* 2>/dev/null || true

      - name: Download and strip OpenJDK 17 (ARM64)
        run: |
          mkdir -p app/src/main/assets/openjdk
          curl -L --retry 5 --retry-delay 30 \
            "https://mirrors.tuna.tsinghua.edu.cn/termux/apt/termux-main/pool/main/o/openjdk-17/openjdk-17_17.0.19_aarch64.deb" \
            -o /tmp/jdk.deb
          dpkg-deb -x /tmp/jdk.deb /tmp/jdk-extracted
          JDK_ROOT=$(dirname $(dirname $(find /tmp/jdk-extracted -name java ! -type d | head -1)))
          cp -r "$JDK_ROOT"/* app/src/main/assets/openjdk/
          rm -rf /tmp/jdk.deb /tmp/jdk-extracted
          rm -rf app/src/main/assets/openjdk/jmods demo sample man include legal jmc
          rm -f app/src/main/assets/openjdk/lib/src.zip
          rm -f app/src/main/assets/openjdk/lib/ct.sym
          for tool in jshell jlink jdeps jstat jmap jstack jcmd jpackage javadoc jarsigner jdeprscan jfr jhsdb jps jconsole jwebserver keytool rmiregistry serialver jmod; do
            rm -f "app/src/main/assets/openjdk/bin/$tool"
          done

      - name: Download git (ARM64)
        run: |
          mkdir -p app/src/main/assets/git
          curl -L --retry 5 --retry-delay 15 \
            "https://mirrors.tuna.tsinghua.edu.cn/termux/apt/termux-main/pool/main/g/git/git_2.55.0_aarch64.deb" \
            -o /tmp/git.deb
          ls -la /tmp/git.deb
          file /tmp/git.deb
          dpkg-deb -x /tmp/git.deb /tmp/git-extracted
          for f in git git-receive-pack git-upload-pack git-upload-archive; do
            find /tmp/git-extracted -name "$f" ! -type d -exec cp {} app/src/main/assets/git/ \;
          done
          chmod -R +x app/src/main/assets/git/
          rm -rf app/src/main/assets/git/libexec 2>/dev/null || true
          rm -rf /tmp/git.deb /tmp/git-extracted

      - name: Generate scripts and configs
        run: |
          mkdir -p app/src/main/assets/gradle-config

          cat > app/src/main/assets/gradle-config/init.gradle << 'INIT'
          allprojects {
              buildscript {
                  repositories {
                      maven { url 'https://maven.aliyun.com/repository/public' }
                      maven { url 'https://maven.aliyun.com/repository/google' }
                      maven { url 'https://maven.aliyun.com/repository/gradle-plugin' }
                  }
              }
              repositories {
                  maven { url 'https://maven.aliyun.com/repository/public' }
                  maven { url 'https://maven.aliyun.com/repository/google' }
                  maven { url 'https://maven.aliyun.com/repository/gradle-plugin' }
              }
          }
          INIT

          cat > app/src/main/assets/gradle-config/setup-gradle-mirror.sh << 'SETUP'
          #!/system/bin/sh
          GRADLE_USER_HOME="${GRADLE_USER_HOME:-$HOME/.gradle}"
          mkdir -p "$GRADLE_USER_HOME"
          SRC_INIT="$(dirname "$0")/init.gradle"
          if [ -f "$SRC_INIT" ]; then
            cp "$SRC_INIT" "$GRADLE_USER_HOME/init.gradle"
          fi
          for wrapper_props in $(find /data -name "gradle-wrapper.properties" 2>/dev/null); do
            if grep -q "services.gradle.org" "$wrapper_props" 2>/dev/null; then
              sed -i 's|https\\\{0,1\}://services\.gradle\.org/distributions|https\\://mirrors.tuna.tsinghua.edu.cn/gradle/gradle-distributions|g' "$wrapper_props"
            fi
          done
          SETUP
          chmod +x app/src/main/assets/gradle-config/setup-gradle-mirror.sh

          cat > app/src/main/assets/gradle-config/run.sh << 'RUN'
          #!/system/bin/sh
          if [ -z "$1" ]; then
            echo "Usage: sh run.sh <github-url>"
            exit 1
          fi
          echo ">>> Cloning $1..."
          git clone "$1" project
          if [ $? -ne 0 ]; then
            echo ">>> Clone failed."
            exit 1
          fi
          cd project
          for wp in $(find . -name "gradle-wrapper.properties" 2>/dev/null); do
            sed -i 's|https\\\{0,1\}://services\.gradle\.org/distributions|https\\://mirrors.tuna.tsinghua.edu.cn/gradle/gradle-distributions|g' "$wp"
          done
          echo ">>> Building..."
          ./gradlew assembleDebug
          if [ $? -eq 0 ]; then
            APK="app/build/outputs/apk/debug/app-debug.apk"
            if [ -f "$APK" ]; then
              echo ">>> Installing..."
              pm install -r "$APK" 2>/dev/null || true
              echo ">>> Done!"
            fi
          else
            echo ">>> Build failed."
            exit 1
          fi
          RUN
          chmod +x app/src/main/assets/gradle-config/run.sh

      - name: Generate asset manifest
        run: |
          cd app/src/main/assets
          find . -type f ! -name '.*' ! -path '*/.*' | sed 's|^\./||' | sort > asset_manifest.txt
          echo "Manifest entries: $(wc -l < asset_manifest.txt)"

      - name: Copy node binary to jniLibs (SELinux bypass)
        run: |
          mkdir -p app/src/main/jniLibs/arm64-v8a
          cp app/src/main/assets/code-server/lib/node app/src/main/jniLibs/arm64-v8a/libnode_exec.so
          chmod +x app/src/main/jniLibs/arm64-v8a/libnode_exec.so
          echo "node binary: $(ls -lh app/src/main/jniLibs/arm64-v8a/libnode_exec.so)"

      - name: Show asset sizes
        run: |
          echo "=== Asset sizes ==="
          du -sh app/src/main/assets/code-server
          du -sh app/src/main/assets/openjdk
          du -sh app/src/main/assets/android-sdk/build-tools
          du -sh app/src/main/assets/android-sdk/platforms
          du -sh app/src/main/assets/gradle-config
          du -sh app/src/main/assets/git 2>/dev/null || echo "no git"
          echo "=== Total assets ==="
          du -sh app/src/main/assets/

      - name: Build debug APK
        run: ./gradlew assembleDebug --stacktrace


      - name: Create Release and Upload APK
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v0.3.7
          name: v0.3.7
          body: |
            ## Changes
            - jniLibs 方案: node 二进制放入 libnode_exec.so，SELinux 兼容执行
            - 修复 nodeBin 未定义引用
          files: app/build/outputs/apk/debug/app-debug.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: mobile-as-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
