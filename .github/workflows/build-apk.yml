name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-35 build-tools;35.0.0 platforms;android-34 build-tools;34.0.0'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Download code-server (ARM64)
        run: |
          mkdir -p app/src/main/assets/code-server
          curl -L --retry 3 --retry-delay 10 \
            "https://github.com/coder/code-server/releases/download/v4.106.2/code-server-4.106.2-linux-arm64.tar.gz" \
            -o /tmp/code-server.tar.gz
          tar -xzf /tmp/code-server.tar.gz -C app/src/main/assets/code-server --strip-components=1
          rm /tmp/code-server.tar.gz
          rm -rf app/src/main/assets/code-server/node_modules app/src/main/assets/code-server/lib/node
          find app/src/main/assets/code-server -name "*.map" -delete
          find app/src/main/assets/code-server -name "*.ts" -delete

      - name: Copy Android SDK assets
        run: |
          mkdir -p app/src/main/assets/android-sdk/build-tools/34.0.0
          cp -r $ANDROID_HOME/build-tools/34.0.0/* app/src/main/assets/android-sdk/build-tools/34.0.0/
          mkdir -p app/src/main/assets/android-sdk/platforms/android-34
          cp -r $ANDROID_HOME/platforms/android-34/* app/src/main/assets/android-sdk/platforms/android-34/

      - name: Replace build-tools with ARM64 versions
        run: |
          curl -L --retry 5 --retry-delay 15 \
            "https://github.com/lzhiyong/android-sdk-tools/releases/download/34.0.3/android-sdk-tools-static-aarch64.zip" \
            -o /tmp/arm64-tools.zip
          unzip -qo /tmp/arm64-tools.zip -d /tmp/arm64-tools
          cp -rf /tmp/arm64-tools/build-tools/* app/src/main/assets/android-sdk/build-tools/34.0.0/
          chmod -R +x app/src/main/assets/android-sdk/build-tools/34.0.0/
          rm -rf /tmp/arm64-tools.zip /tmp/arm64-tools

      - name: Download and strip OpenJDK 17 (ARM64)
        run: |
          mkdir -p app/src/main/assets/openjdk
          curl -L --retry 5 --retry-delay 30 \
            "https://mirrors.tuna.tsinghua.edu.cn/termux/apt/termux-main/pool/main/o/openjdk-17/openjdk-17_17.0.19_aarch64.deb" \
            -o /tmp/jdk.deb
          dpkg-deb -x /tmp/jdk.deb /tmp/jdk-extracted
          JDK_ROOT=$(dirname $(dirname $(find /tmp/jdk-extracted -name java ! -type d | head -1)))
          cp -r "$JDK_ROOT"/* app/src/main/assets/openjdk/
          rm -rf /tmp/jdk.deb /tmp/jdk-extracted
          # Strip non-essential files
          rm -rf app/src/main/assets/openjdk/jmods
          rm -rf app/src/main/assets/openjdk/demo
          rm -rf app/src/main/assets/openjdk/sample
          rm -rf app/src/main/assets/openjdk/man
          rm -rf app/src/main/assets/openjdk/include
          rm -f app/src/main/assets/openjdk/lib/src.zip
          rm -rf app/src/main/assets/openjdk/jmc
          rm -rf app/src/main/assets/openjdk/legal
          echo "JDK stripped size: $(du -sh app/src/main/assets/openjdk | cut -f1)"

      - name: Build debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: mobile-as-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
